openapi: 3.0.3
info:
  title: Calculator API
  version: 1.0.0
  description: |
    Minimal REST API for calculator operations.

    This API is intentionally small and designed with maintainability and clarity as primary goals.

servers:
  - url: http://localhost:8080
    description: Local backend server

tags:
  - name: Calculator
    description: Calculator operations
  - name: Infrastructure
    description: Health and liveness checks

paths:
  /health:
    get:
      tags:
        - Infrastructure
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
              examples:
                healthy:
                  value:
                    status: ok

  /api/v1/calculations:
    post:
      tags:
        - Calculator
      summary: Create a calculation
      operationId: createCalculation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateRequest'
            examples:
              addition:
                summary: Addition example
                value:
                  op: add
                  a: 10
                  b: 5
              power:
                summary: Exponentiation example
                value:
                  op: power
                  a: 2
                  b: 3
              division:
                summary: Division example
                value:
                  op: divide
                  a: 20
                  b: 4
              squareRoot:
                summary: Square root example
                value:
                  op: sqrt
                  a: 9
              percentage:
                summary: Percentage example
                value:
                  op: percentage
                  a: 10
                  b: 200
      responses:
        '200':
          description: Successful calculation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculateResponse'
              examples:
                success:
                  value:
                    result: 15
        '400':
          description: Invalid request payload, missing field, or invalid operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingField:
                  value:
                    error:
                      code: MISSING_FIELD
                      message: a is required
                invalidOperation:
                  value:
                    error:
                      code: INVALID_OPERATION
                      message: operation must be one of add, subtract, multiply, divide, power, sqrt, percentage
                invalidUnaryOperand:
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: b is not allowed for sqrt
                malformedRequest:
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: request body is invalid
        '422':
          description: Valid request format but invalid mathematical operation or operand range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                divisionByZero:
                  value:
                    error:
                      code: DIVISION_BY_ZERO
                      message: division by zero is not allowed
                negativeSquareRoot:
                  value:
                    error:
                      code: NEGATIVE_SQUARE_ROOT
                      message: square root is only defined for non-negative numbers
                nonFiniteResult:
                  value:
                    error:
                      code: NON_FINITE_RESULT
                      message: calculation result is not a finite real number
                operandOutOfRange:
                  value:
                    error:
                      code: OPERAND_OUT_OF_RANGE
                      message: operands must be between -1000 and 1000
        '500':
          description: Unexpected server-side error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internalError:
                  value:
                    error:
                      code: INTERNAL_ERROR
                      message: an unexpected error occurred

components:
  schemas:
    CalculateRequest:
      oneOf:
        - $ref: '#/components/schemas/BinaryCalculateRequest'
        - $ref: '#/components/schemas/UnaryCalculateRequest'

    BinaryCalculateRequest:
      type: object
      additionalProperties: false
      required:
        - op
        - a
        - b
      properties:
        op:
          type: string
          description: Calculator operation to execute
          enum:
            - add
            - subtract
            - multiply
            - divide
            - power
            - percentage
        a:
          type: number
          format: double
          description: First operand
        b:
          type: number
          format: double
          description: Second operand

    UnaryCalculateRequest:
      type: object
      additionalProperties: false
      required:
        - op
        - a
      properties:
        op:
          type: string
          description: Calculator operation to execute
          enum:
            - sqrt
        a:
          type: number
          format: double
          description: Unary operand

    CalculateResponse:
      type: object
      additionalProperties: false
      required:
        - result
      properties:
        result:
          type: number
          format: double
          description: Computed result

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: INVALID_REQUEST
        message:
          type: string
          description: Human-readable error message
          example: request body is invalid
