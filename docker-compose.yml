services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      CALC_MIN: ${CALC_MIN}
      CALC_MAX: ${CALC_MAX}

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
