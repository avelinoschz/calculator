# The frontend container serves pre-built static files and has no awareness
# of the backend. In the browser, the React app calls /api/... as a relative
# path (the same origin it was loaded from). In dev mode, Vite proxies those
# requests to :8080. In Docker Compose there is no Vite, so nginx must do the
# same: the /api/ block below forwards those calls to the backend service.
# Without it, nginx would look for /api/... as a static file and return 404.
server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
